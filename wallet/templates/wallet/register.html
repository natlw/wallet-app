<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Rejestracja</title>
</head>
<body>
    <h2>Stwórz nowe konto użytkownika</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Zarejestruj się</button>
    </form>

    <p>Masz już konto? <a href="{% url 'login' %}">Zaloguj się tutaj</a></p>
</body>
</html>
